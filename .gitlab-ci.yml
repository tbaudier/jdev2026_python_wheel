
stages:
  - build
  - publish

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# ------------------------
# BUILD WHEEL
# ------------------------
build-wheel:
  stage: build
  image: python:3.14

  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH =~ /^(master|workshop_starting_point|working_example)$/'
    - if: '$CI_COMMIT_TAG'

  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install build

  script:
    - python -m build

  artifacts:
    name: wheel
    paths:
      - dist/
    expire_in: 1 week

  cache:
    paths:
      - .cache/pip


# ------------------------
# PUBLISH TO TEST PYPI
# ------------------------
upload-wheel:
  stage: publish
  image: python:3.14
  needs: ["build-wheel"]

  rules:
    # Only run on tag pushes
    - if: '$CI_COMMIT_TAG'

  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install twine

  script:
    - twine upload dist/* --repository-url https://test.pypi.org/legacy/ -u __token__ -p "$TEST_PYPI_API_TOKEN" --skip-existing

